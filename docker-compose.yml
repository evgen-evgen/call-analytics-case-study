name: mtbank-ai-hiring

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: mtbank-open-webui
    restart: unless-stopped
    environment:
      ENABLE_API_KEYS: "true"
      BYPASS_EMBEDDING_AND_RETRIEVAL: "true"
      ENABLE_PERSISTENT_CONFIG: "false"
      DEFAULT_MODELS: mtbank_progress
      DEFAULT_PINNED_MODELS: mtbank_progress
      OPENAI_API_BASE_URL: http://pipelines:9099/v1
      OPENAI_API_KEY: ${PIPELINES_API_KEY}
      WEBUI_SECRET_KEY: ${PIPELINES_API_KEY}
      ENABLE_EVALUATION_ARENA_MODELS: "false"
    ports:
      - "3001:8080"
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - pipelines

  pipelines:
    build:
      context: .
      dockerfile: Dockerfile.pipelines
      # BuildKit's bridge traffic is intercepted by the local Tailscale policy
      # routes. Host networking is used only while installing build packages.
      network: host

    container_name: mtbank-pipelines
    restart: unless-stopped

    environment:
      PIPELINES_API_KEY: ${PIPELINES_API_KEY}

      OPENWEBUI_BASE_URL: ${OPENWEBUI_BASE_URL}
      OPENWEBUI_API_KEY: ${OPENWEBUI_API_KEY}

      WHISPER_MODEL: ${WHISPER_MODEL}
      WHISPER_DEVICE: ${WHISPER_DEVICE}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE}

      HF_TOKEN: ${HF_TOKEN}
      DIARIZATION_MODEL: ${DIARIZATION_MODEL}
      DIARIZATION_DEVICE: ${DIARIZATION_DEVICE}
      MAX_CONCURRENT_AUDIO_JOBS: ${MAX_CONCURRENT_AUDIO_JOBS:-1}

      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RUNTIME_LOG_LEVEL: ${RUNTIME_LOG_LEVEL:-WARNING}

      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      CHAT_CONTEXT_MAX_CHARS: ${CHAT_CONTEXT_MAX_CHARS:-40000}

    ports:
      - "9099:9099"

    volumes:
      - ./pipelines:/app/pipelines
      - ./app:/app/app
      - huggingface_cache:/root/.cache/huggingface

volumes:
  open_webui_data:
  huggingface_cache:
